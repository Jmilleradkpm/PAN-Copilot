# ============================================================
# PAN Copilot — Build & Release
# ============================================================
# Triggered manually via workflow_dispatch (Actions → Run workflow).
# Tag the repo first, then trigger the workflow with the matching version.
#
# Outputs uploaded to Cloudflare R2:
#   /releases/v1.0.0/PAN_Copilot_v1.0.0.zip            ← zip (portable)
#   /releases/v1.0.0/PAN_Copilot_Setup_v1.0.0.exe      ← signed installer
#   /version.json                                        ← machine-readable manifest
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CF_R2_ACCESS_KEY_ID         R2 API token Access Key ID
#   CF_R2_SECRET_ACCESS_KEY     R2 API token Secret
#   CF_R2_ACCOUNT_ID            Your Cloudflare account ID (32 hex chars)
#   CF_R2_BUCKET                Bucket name, e.g. pan-copilot-downloads
#   PAN_COPILOT_SYSTEM_PROMPT   Full text of PAN_Copilot_Master_System_Prompt.md
#   AZURE_TENANT_ID             Azure AD tenant ID (for Trusted Signing)
#   AZURE_CLIENT_ID             Azure app registration client ID
#   AZURE_SUBSCRIPTION_ID       Azure subscription ID
# ============================================================

name: Build & Upload to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.33)'
        required: true

jobs:
  build-windows:
    name: Build Windows .exe and upload to R2
    runs-on: windows-latest
    permissions:
      id-token: write   # required for OIDC auth with Azure
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: local/requirements.txt

      # ── 3. Write system prompts from secrets ───────────────
      - name: Write system prompts
        shell: pwsh
        env:
          PROMPT_CLOUD: ${{ secrets.PAN_COPILOT_SYSTEM_PROMPT }}
          PROMPT_LOCAL: ${{ secrets.PAN_COPILOT_SYSTEM_PROMPT_LOCAL }}
        run: |
          $cloud = $env:PROMPT_CLOUD
          if (-not $cloud) {
            Write-Warning "PAN_COPILOT_SYSTEM_PROMPT secret is empty — using placeholder"
            $cloud = "# PAN Copilot System Prompt`nYou are PAN Copilot, an expert AI assistant for Palo Alto Networks engineers."
          }
          Set-Content -Path "PAN_Copilot_Master_System_Prompt.md" -Value $cloud -Encoding UTF8
          Write-Host "Cloud prompt written ($($cloud.Length) chars)"

          $local = $env:PROMPT_LOCAL
          if (-not $local) {
            Write-Warning "PAN_COPILOT_SYSTEM_PROMPT_LOCAL secret is empty — falling back to the cloud prompt"
            $local = $cloud
          }
          Set-Content -Path "PAN_Copilot_Master_System_Prompt_Local.md" -Value $local -Encoding UTF8
          Write-Host "Local prompt written ($($local.Length) chars)"

      # ── 4. Install deps + PyInstaller ──────────────────────
      - name: Install Python dependencies
        working-directory: local
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4b. Encrypt prompts + write _prompt_key.py ─────────
      # Encrypts both .md files with AES-256-GCM using the
      # PAN_COPILOT_PROMPT_AES_KEY secret. The .enc files plus the
      # _prompt_key.py module are what PyInstaller bundles into the exe;
      # the plaintext .md files are deleted after encryption so they can't
      # end up in the build artifact by accident.
      - name: Encrypt prompts
        shell: bash
        env:
          PROMPT_AES_KEY_B64: ${{ secrets.PAN_COPILOT_PROMPT_AES_KEY }}
        run: |
          if [ -z "$PROMPT_AES_KEY_B64" ]; then
            echo "PAN_COPILOT_PROMPT_AES_KEY secret is not set. Generate a 32-byte key with: python -c \"import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())\"" >&2
            exit 1
          fi
          python - <<'PY'
          import base64, os, pathlib, secrets
          from cryptography.hazmat.primitives.ciphers.aead import AESGCM
          key_b64 = os.environ["PROMPT_AES_KEY_B64"].strip()
          key = base64.b64decode(key_b64)
          if len(key) != 32:
              raise SystemExit(f"PAN_COPILOT_PROMPT_AES_KEY must decode to 32 bytes; got {len(key)}")
          aes = AESGCM(key)
          for name in ["PAN_Copilot_Master_System_Prompt.md", "PAN_Copilot_Master_System_Prompt_Local.md"]:
              p = pathlib.Path(name)
              if not p.exists():
                  raise SystemExit(f"Missing {name} — Write system prompts step must run first.")
              pt = p.read_bytes()
              nonce = secrets.token_bytes(12)
              ct = aes.encrypt(nonce, pt, None)
              pathlib.Path(name + ".enc").write_bytes(nonce + ct)
              p.unlink()  # delete plaintext so it can't be bundled
              print(f"Encrypted {name} -> {name}.enc ({len(ct)} bytes ciphertext)")
          pathlib.Path("local/_prompt_key.py").write_text(
              "# Auto-generated by CI from PAN_COPILOT_PROMPT_AES_KEY secret.\n"
              "# NEVER commit this file. It is in .gitignore.\n"
              f'PROMPT_KEY_B64 = "{key_b64}"\n',
              encoding="utf-8"
          )
          print("Wrote local/_prompt_key.py")
          PY

      # ── 5. Inject version into app.py ─────────────────────────
      - name: Inject version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".TrimStart('v')
          (Get-Content "local/app.py") -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content "local/app.py" -Encoding UTF8
          Write-Host "Injected APP_VERSION = $version"

      # ── 6. Build ───────────────────────────────────────────
      - name: Build with PyInstaller
        working-directory: local
        shell: pwsh
        run: |
          pyinstaller pan_copilot.spec --clean --noconfirm
          Write-Host "Build output:"
          Get-ChildItem dist -Recurse | Select-Object FullName | Format-Table

      # ── 6. Azure login for signing ─────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 7. Sign the main executable ────────────────────────
      - name: Sign PAN Copilot.exe
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:               ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:               ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                      https://eus.codesigning.azure.net/
          trusted-signing-account-name:  adkcyber-signing
          certificate-profile-name:      pan-copilot
          files-folder:                  local/dist/PAN Copilot
          files-folder-filter:           exe
          file-digest:                   SHA256
          timestamp-rfc3161:             http://timestamp.acs.microsoft.com
          timestamp-digest:              SHA256

      # ── 8. Zip the dist folder ─────────────────────────────
      - name: Package distribution
        working-directory: local
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}"
          $zipName = "PAN_Copilot_${version}.zip"
          Compress-Archive -Path "dist\PAN Copilot\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName ($('{0:N1} MB' -f ((Get-Item $zipName).Length / 1MB)))"

      # ── 9. Build Inno Setup installer ─────────────────────
      - name: Build Windows installer
        working-directory: local
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$version installer.iss
          $installer = "Output\PAN_Copilot_Setup_${version}.exe"
          if (-not (Test-Path $installer)) {
            throw "Installer not found at $installer"
          }
          Write-Host "Installer built: $installer ($('{0:N1} MB' -f ((Get-Item $installer).Length / 1MB)))"

      # ── 10. Sign the installer ─────────────────────────────
      - name: Sign installer exe
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:               ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:               ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                      https://eus.codesigning.azure.net/
          trusted-signing-account-name:  adkcyber-signing
          certificate-profile-name:      pan-copilot
          files-folder:                  local/Output
          files-folder-filter:           exe
          file-digest:                   SHA256
          timestamp-rfc3161:             http://timestamp.acs.microsoft.com
          timestamp-digest:              SHA256

      # ── 11. Write version manifest ─────────────────────────
      - name: Create version.json
        working-directory: local
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}"
          $ts      = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $json = [ordered]@{
            version       = $version
            released_at   = $ts
            download_url  = "https://downloads.adkcyber.com/releases/${version}/PAN_Copilot_${version}.zip"
            versioned_url = "https://downloads.adkcyber.com/releases/${version}/PAN_Copilot_${version}.zip"
            installer_url = "https://downloads.adkcyber.com/releases/${version}/PAN_Copilot_Setup_${version}.exe"
            min_app_version = "1.0.0"
          } | ConvertTo-Json -Depth 3
          Set-Content -Path "version.json" -Value $json -Encoding UTF8
          Write-Host $json

      # ── 12. Upload to R2 ───────────────────────────────────
      - name: Configure AWS CLI for R2
        shell: pwsh
        run: |
          aws configure set aws_access_key_id     "${{ secrets.CF_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region        "auto"

      - name: Upload to Cloudflare R2
        working-directory: local
        shell: pwsh
        env:
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET: ${{ secrets.CF_R2_BUCKET }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          $ep     = $env:R2_ENDPOINT
          $bucket = $env:BUCKET
          $ver    = $env:VERSION

          Write-Host "Uploading versioned zip..."
          aws s3 cp "PAN_Copilot_${ver}.zip" `
            "s3://${bucket}/releases/${ver}/PAN_Copilot_${ver}.zip" `
            --endpoint-url $ep --cache-control "no-cache"

          Write-Host "Uploading installer..."
          aws s3 cp "Output\PAN_Copilot_Setup_${ver}.exe" `
            "s3://${bucket}/releases/${ver}/PAN_Copilot_Setup_${ver}.exe" `
            --endpoint-url $ep --cache-control "no-cache"

          Write-Host "Uploading version manifest..."
          aws s3 cp "version.json" `
            "s3://${bucket}/version.json" `
            --endpoint-url $ep `
            --content-type "application/json" `
            --cache-control "no-cache"

          Write-Host ""
          Write-Host "✅ Release ${ver} uploaded to R2"
          Write-Host "   Zip:       https://downloads.adkcyber.com/releases/${ver}/PAN_Copilot_${ver}.zip"
          Write-Host "   Installer: https://downloads.adkcyber.com/releases/${ver}/PAN_Copilot_Setup_${ver}.exe"
