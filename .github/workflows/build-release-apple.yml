# ============================================================
# ADK Cyber AI — Mac Catalyst + iOS (.NET MAUI)
# ============================================================
# Builds PanCopilot.Apple from PanCopilot.Core + shared Frontend.
# Requires macOS + Xcode for signing. Produces unsigned artifacts
# on PR/manual runs; wire signing secrets for App Store distribution.
# ============================================================
name: Build Apple (.NET MAUI)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v3.20)'
        required: true

jobs:
  build-apple:
    runs-on: macos-14
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Write system prompt from secret
        shell: bash
        env:
          PROMPT: ${{ secrets.PAN_COPILOT_SYSTEM_PROMPT }}
        run: |
          if [ -z "$PROMPT" ]; then echo "PAN_COPILOT_SYSTEM_PROMPT secret is empty"; exit 1; fi
          printf '%s' "$PROMPT" > PAN_Copilot_Master_System_Prompt.md

      - name: Encrypt system prompt
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.PAN_COPILOT_PROMPT_AES_KEY }}
        run: |
          if (-not $env:KEY_B64) { throw "PAN_COPILOT_PROMPT_AES_KEY secret not set" }
          $key = [Convert]::FromBase64String($env:KEY_B64)
          $pt = [System.IO.File]::ReadAllBytes("PAN_Copilot_Master_System_Prompt.md")
          $nonce = [byte[]]::new(12)
          [System.Security.Cryptography.RandomNumberGenerator]::Fill($nonce)
          $ct = [byte[]]::new($pt.Length)
          $tag = [byte[]]::new(16)
          $aes = [System.Security.Cryptography.AesGcm]::new($key, 16)
          $aes.Encrypt($nonce, $pt, $ct, $tag, $null)
          $aes.Dispose()
          $blob = New-Object byte[] (12 + $pt.Length + 16)
          [Array]::Copy($nonce, 0, $blob, 0, 12)
          [Array]::Copy($ct, 0, $blob, 12, $pt.Length)
          [Array]::Copy($tag, 0, $blob, 12 + $pt.Length, 16)
          [System.IO.File]::WriteAllBytes("PanCopilot.Core/Services/system_prompt.bin", $blob)
          $lines = @(
            'namespace PanCopilot.Services;'
            'internal static class PromptKey {'
            "    public const string KeyB64 = `"$($env:KEY_B64)`";"
            '}'
          )
          Set-Content -Path "PanCopilot.Core/Services/PromptKey.cs" -Value $lines -Encoding UTF8
          Remove-Item "PAN_Copilot_Master_System_Prompt.md" -Force

      - name: Inject version
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}".TrimStart('v')
          foreach ($proj in @('PanCopilot.Core/PanCopilot.Core.csproj', 'PanCopilot.Apple/PanCopilot.Apple.csproj')) {
            (Get-Content $proj) -replace '<Version>.*?</Version>', "<Version>$v.0</Version>" | Set-Content $proj
            (Get-Content $proj) -replace '<ApplicationDisplayVersion>.*?</ApplicationDisplayVersion>', "<ApplicationDisplayVersion>$v</ApplicationDisplayVersion>" | Set-Content $proj
          }

      - name: Restore + test Core
        run: |
          dotnet restore PanCopilot.sln
          dotnet test PanCopilot.Tests/PanCopilot.Tests.csproj --configuration Release

      - name: Import signing certificate (optional)
        if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/apple_dist.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/apple_dist.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

      - name: Build Mac Catalyst
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_KEY: ${{ secrets.APPLE_CODESIGN_KEY }}
          APPLE_CODESIGN_PROVISION: ${{ secrets.APPLE_CODESIGN_PROVISION_MAC }}
        run: |
          EXTRA_SIGN=""
          if [ -n "$APPLE_CODESIGN_KEY" ]; then
            EXTRA_SIGN="-p:EnableCodeSigning=true -p:AppleTeamId=$APPLE_TEAM_ID -p:CodesignKey=$APPLE_CODESIGN_KEY -p:CodesignProvision=$APPLE_CODESIGN_PROVISION"
          fi
          dotnet publish PanCopilot.Apple/PanCopilot.Apple.csproj \
            -f net8.0-maccatalyst \
            -c Release \
            -r maccatalyst-arm64 \
            -p:CreatePackage=true \
            $EXTRA_SIGN \
            -o publish/maccatalyst

      - name: Build iOS (device)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_KEY: ${{ secrets.APPLE_CODESIGN_KEY }}
          APPLE_CODESIGN_PROVISION: ${{ secrets.APPLE_CODESIGN_PROVISION_IOS }}
        run: |
          EXTRA_SIGN=""
          if [ -n "$APPLE_CODESIGN_KEY" ]; then
            EXTRA_SIGN="-p:EnableCodeSigning=true -p:AppleTeamId=$APPLE_TEAM_ID -p:CodesignKey=$APPLE_CODESIGN_KEY -p:CodesignProvision=$APPLE_CODESIGN_PROVISION"
          fi
          dotnet publish PanCopilot.Apple/PanCopilot.Apple.csproj \
            -f net8.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:BuildIpa=true \
            $EXTRA_SIGN \
            -o publish/ios

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ADK_Cyber_AI_${{ inputs.version }}_Apple
          path: |
            dotnet/publish/maccatalyst/**
            dotnet/publish/ios/**