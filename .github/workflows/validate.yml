# Fast push-time check so commits get a green status when workflow YAML is valid.
name: Validate CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-workflows:
    name: Validate workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1