# Fast push-time check so commits get a green status when workflow YAML is valid.
name: Validate CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-workflows:
    name: Validate workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse GitHub Actions workflow YAML
        run: |
          python3 - <<'PY'
          import glob
          import sys

          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml

          for path in sorted(glob.glob(".github/workflows/*.yml")):
              with open(path, encoding="utf-8") as handle:
                  yaml.safe_load(handle)
              print(f"OK: {path}")

          print("All workflow files parsed successfully")
          PY