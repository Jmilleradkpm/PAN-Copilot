# ============================================================
# ADK Cyber AI (.NET) - Build & Release
# ============================================================
# Replaces the v2 PyInstaller pipeline. Builds a self-contained .NET app,
# signs it with Azure Trusted Signing (same Adirondack CyberSecurity cert as
# v2), wraps it in an Inno Setup installer that shares the v2 AppId for
# in-place upgrades, hashes both artifacts, and uploads to R2. Overwriting
# version.json at the bucket root flips the live update pointer for every
# v2.1+ client.
#
# No Python, no PyInstaller, no jiter.pyd -- nothing for AV behavioral
# scanners to flag.
#
# Lives in PAN-Copilot (not PAN-Copilot-dotnet) so it can reuse the existing
# Azure OIDC trust and R2/signing secrets. Source for the .NET app is under
# the dotnet/ subdirectory.
# ============================================================
name: Build & Release (.NET)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v3.0)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write   # OIDC for Azure Trusted Signing
      contents: read
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Write system prompt from secret
        shell: pwsh
        env:
          PROMPT: ${{ secrets.PAN_COPILOT_SYSTEM_PROMPT }}
        run: |
          if (-not $env:PROMPT) { throw "PAN_COPILOT_SYSTEM_PROMPT secret is empty" }
          Set-Content -Path "PAN_Copilot_Master_System_Prompt.md" -Value $env:PROMPT -Encoding UTF8

      # Encrypt the prompt with AES-256-GCM into Services/system_prompt.bin,
      # generate Services/PromptKey.cs with the key, and DELETE the plaintext
      # so it cannot end up in publish/ or the release zip. Wire format:
      # nonce(12) || ciphertext(N) || tag(16).
      - name: Encrypt system prompt + generate key constant
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.PAN_COPILOT_PROMPT_AES_KEY }}
        run: |
          if (-not $env:KEY_B64) { throw "PAN_COPILOT_PROMPT_AES_KEY secret not set" }
          $key = [Convert]::FromBase64String($env:KEY_B64)
          if ($key.Length -ne 32) { throw "Key must decode to 32 bytes; got $($key.Length)" }

          $pt = [System.IO.File]::ReadAllBytes("PAN_Copilot_Master_System_Prompt.md")
          $nonce = [byte[]]::new(12)
          [System.Security.Cryptography.RandomNumberGenerator]::Fill($nonce)
          $ct = [byte[]]::new($pt.Length)
          $tag = [byte[]]::new(16)
          $aes = [System.Security.Cryptography.AesGcm]::new($key, 16)
          $aes.Encrypt($nonce, $pt, $ct, $tag, $null)
          $aes.Dispose()

          $blob = New-Object byte[] (12 + $pt.Length + 16)
          [Array]::Copy($nonce, 0, $blob, 0, 12)
          [Array]::Copy($ct,    0, $blob, 12, $pt.Length)
          [Array]::Copy($tag,   0, $blob, 12 + $pt.Length, 16)
          [System.IO.File]::WriteAllBytes("Services/system_prompt.bin", $blob)
          Write-Host "Encrypted prompt: $($pt.Length) -> $($blob.Length) bytes"

          # Build PromptKey.cs as an array of lines so the whole block stays
          # YAML-indented (PowerShell here-strings need column-0 close markers
          # which clash with YAML literal-block indentation).
          $lines = @(
            'namespace PanCopilot.Services;'
            '// AUTO-GENERATED by CI from PAN_COPILOT_PROMPT_AES_KEY. Do not commit.'
            'internal static class PromptKey'
            '{'
            "    public const string KeyB64 = `"$($env:KEY_B64)`";"
            '}'
          )
          Set-Content -Path "Services/PromptKey.cs" -Value $lines -Encoding UTF8

          Remove-Item "PAN_Copilot_Master_System_Prompt.md" -Force
          Write-Host "Plaintext deleted; only Services/system_prompt.bin remains"

      - name: Restore + test
        run: |
          dotnet restore
          dotnet test PanCopilot.Tests/PanCopilot.Tests.csproj --configuration Release

      - name: Inject version
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}".TrimStart('v')
          (Get-Content PanCopilot.csproj) -replace '<Version>.*?</Version>', "<Version>$v.0</Version>" | Set-Content PanCopilot.csproj

      - name: Publish (self-contained, single-file)
        shell: pwsh
        run: |
          dotnet publish PanCopilot.csproj -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish
          # SANITY: plaintext system prompt must never appear in publish/.
          $leak = Get-ChildItem publish -Recurse -File -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -match 'System_Prompt' }
          if ($leak) { throw "FAIL: plaintext prompt leaked into publish/: $($leak.FullName)" }
          Write-Host "OK: no plaintext system prompt in publish/"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign the executable
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:               ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:               ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                      https://eus.codesigning.azure.net/
          trusted-signing-account-name:  adkcyber-signing
          certificate-profile-name:      pan-copilot
          files-folder:                  dotnet/publish
          files-folder-filter:           exe
          file-digest:                   SHA256
          timestamp-rfc3161:             http://timestamp.acs.microsoft.com
          timestamp-digest:              SHA256

      - name: Build installer (Inno Setup -- same AppId as v2 = in-place upgrade)
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$v installer.iss
          if (-not (Test-Path "Output\ADK_Cyber_AI_Setup_$v.exe")) { throw "Installer not built" }

      - name: Sign installer
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:               ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:               ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                      https://eus.codesigning.azure.net/
          trusted-signing-account-name:  adkcyber-signing
          certificate-profile-name:      pan-copilot
          files-folder:                  dotnet/Output
          files-folder-filter:           exe
          file-digest:                   SHA256
          timestamp-rfc3161:             http://timestamp.acs.microsoft.com
          timestamp-digest:              SHA256

      # Hash the SIGNED artifacts. installer_sha256 is verified by both the v2.1
      # client (pre-upgrade) and the v3 UpdateService before execution.
      - name: Package + hash
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $zip = "ADK_Cyber_AI_$v.zip"
          Compress-Archive -Path publish\* -DestinationPath $zip -Force
          $zipSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLower()
          $instSha = (Get-FileHash -Algorithm SHA256 -LiteralPath "Output\ADK_Cyber_AI_Setup_$v.exe").Hash.ToLower()
          $json = [ordered]@{
            version          = $v
            released_at      = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            download_url     = "https://downloads.adkcyber.com/releases/$v/ADK_Cyber_AI_$v.zip"
            zip_sha256       = $zipSha
            installer_url    = "https://downloads.adkcyber.com/releases/$v/ADK_Cyber_AI_Setup_$v.exe"
            installer_sha256 = $instSha
            min_app_version  = "1.0.0"
            runtime          = "dotnet-self-contained"
          } | ConvertTo-Json -Depth 3
          Set-Content -Path version.json -Value $json -Encoding UTF8
          Write-Host $json

      # NOTE: overwriting version.json at the bucket root flips the LIVE update
      # pointer -- every v2.1+ client will see this version, verify its hash and
      # signature, and auto-upgrade to the .NET build. Run deliberately.
      - name: Upload to R2
        shell: pwsh
        env:
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET: ${{ secrets.CF_R2_BUCKET }}
          VERSION: ${{ inputs.version }}
        run: |
          aws configure set aws_access_key_id     "${{ secrets.CF_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region        "auto"
          aws s3 cp "ADK_Cyber_AI_${env:VERSION}.zip" "s3://${env:BUCKET}/releases/${env:VERSION}/ADK_Cyber_AI_${env:VERSION}.zip" --endpoint-url $env:R2_ENDPOINT --cache-control "no-cache"
          aws s3 cp "Output\ADK_Cyber_AI_Setup_${env:VERSION}.exe" "s3://${env:BUCKET}/releases/${env:VERSION}/ADK_Cyber_AI_Setup_${env:VERSION}.exe" --endpoint-url $env:R2_ENDPOINT --cache-control "no-cache"
          aws s3 cp version.json "s3://${env:BUCKET}/version.json" --endpoint-url $env:R2_ENDPOINT --content-type "application/json" --cache-control "no-cache"
