# ============================================================
# ADK Cyber AI — MSIX package for Microsoft Store
# ============================================================
# Produces an unsigned .msix + .msixupload for Partner Center (Store re-signs after upload).
# Also merges version + store_url into R2 /version.json (preserves zip fields for legacy clients).
# ============================================================
name: Build MSIX (Store)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v3.17)'
        required: true

jobs:
  build-msix:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject version
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}".TrimStart('v')
          (Get-Content PanCopilot.csproj) -replace '<Version>.*?</Version>', "<Version>$v.0</Version>" | Set-Content PanCopilot.csproj

      - name: Write system prompt from secret
        shell: pwsh
        env:
          PROMPT: ${{ secrets.PAN_COPILOT_SYSTEM_PROMPT }}
        run: |
          if (-not $env:PROMPT) { throw "PAN_COPILOT_SYSTEM_PROMPT secret is empty" }
          Set-Content -Path "PAN_Copilot_Master_System_Prompt.md" -Value $env:PROMPT -Encoding UTF8

      - name: Encrypt system prompt + generate key constant
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.PAN_COPILOT_PROMPT_AES_KEY }}
        run: |
          if (-not $env:KEY_B64) { throw "PAN_COPILOT_PROMPT_AES_KEY secret not set" }
          $key = [Convert]::FromBase64String($env:KEY_B64)
          if ($key.Length -ne 32) { throw "Key must decode to 32 bytes; got $($key.Length)" }

          $pt = [System.IO.File]::ReadAllBytes("PAN_Copilot_Master_System_Prompt.md")
          $nonce = [byte[]]::new(12)
          [System.Security.Cryptography.RandomNumberGenerator]::Fill($nonce)
          $ct = [byte[]]::new($pt.Length)
          $tag = [byte[]]::new(16)
          $aes = [System.Security.Cryptography.AesGcm]::new($key, 16)
          $aes.Encrypt($nonce, $pt, $ct, $tag, $null)
          $aes.Dispose()

          $blob = New-Object byte[] (12 + $pt.Length + 16)
          [Array]::Copy($nonce, 0, $blob, 0, 12)
          [Array]::Copy($ct,    0, $blob, 12, $pt.Length)
          [Array]::Copy($tag,   0, $blob, 12 + $pt.Length, 16)
          [System.IO.File]::WriteAllBytes("PanCopilot.Core/Services/system_prompt.bin", $blob)

          $lines = @(
            'namespace PanCopilot.Services;'
            '// AUTO-GENERATED by CI from PAN_COPILOT_PROMPT_AES_KEY. Do not commit.'
            'internal static class PromptKey'
            '{'
            "    public const string KeyB64 = `"$($env:KEY_B64)`";"
            '}'
          )
          Set-Content -Path "PanCopilot.Core/Services/PromptKey.cs" -Value $lines -Encoding UTF8
          Remove-Item "PAN_Copilot_Master_System_Prompt.md" -Force

      - name: Fetch known-issues corpus
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET: ${{ secrets.CF_R2_BUCKET }}
        run: |
          try {
            aws s3 cp "s3://${env:BUCKET}/data/known_issues.json" known_issues.json --endpoint-url $env:R2_ENDPOINT
          } catch {
            Write-Warning "known_issues.json unavailable — lookup will be inert in this MSIX build."
          }

      - name: Restore + test
        run: |
          dotnet restore
          dotnet test PanCopilot.Tests/PanCopilot.Tests.csproj --configuration Release

      - name: Verify built exe version matches the release
        shell: pwsh
        run: |
          $expected = "${{ inputs.version }}".TrimStart('v')
          dotnet publish PanCopilot.csproj -c Release -r win-x64 --self-contained true -o publish
          $exe = "publish\PAN Copilot.exe"
          $fv = (Get-Item $exe).VersionInfo.FileVersion
          if ($fv -notlike "$expected.*" -and $fv -ne $expected) {
            throw "Version mismatch: requested $expected but built exe reports $fv"
          }

      - name: Build MSIX + msixupload (Partner Center)
        shell: pwsh
        run: |
          $out = "ADK_Cyber_AI_${{ inputs.version }}_Store.msix"
          & packaging\Build-Msix.ps1 -PublishDir publish -OutputPath $out
          if (-not (Test-Path ([System.IO.Path]::ChangeExtension($out, '.msixupload')))) {
            throw "Expected msixupload sibling was not created"
          }

      - name: Update R2 version.json (version label + store_url)
        shell: pwsh
        env:
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET: ${{ secrets.CF_R2_BUCKET }}
          VERSION: ${{ inputs.version }}
        run: |
          aws configure set aws_access_key_id     "${{ secrets.CF_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region        "auto"

          $manifestPath = "version.json"
          $hadExisting = $false
          try {
            aws s3 cp "s3://${env:BUCKET}/version.json" $manifestPath --endpoint-url $env:R2_ENDPOINT
            if ($LASTEXITCODE -eq 0) { $hadExisting = $true }
          } catch {
            Write-Warning "No existing version.json on R2; creating a minimal manifest."
          }

          if ($hadExisting -and (Test-Path $manifestPath)) {
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          } else {
            $manifest = [ordered]@{
              min_app_version = "1.0.0"
              runtime         = "dotnet-self-contained"
            }
          }

          $manifest.version     = $env:VERSION
          $manifest.released_at = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $manifest.store_url   = "https://apps.microsoft.com/detail/9N96MGRCG0JK"

          $json = $manifest | ConvertTo-Json -Depth 5
          Set-Content -Path $manifestPath -Value $json -Encoding UTF8
          Write-Host $json

          aws s3 cp $manifestPath "s3://${env:BUCKET}/version.json" `
            --endpoint-url $env:R2_ENDPOINT --content-type "application/json" --cache-control "no-cache"

      - name: Upload Store package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ADK_Cyber_AI_${{ inputs.version }}_Store_msix
          path: |
            dotnet/ADK_Cyber_AI_${{ inputs.version }}_Store.msix
            dotnet/ADK_Cyber_AI_${{ inputs.version }}_Store.msixupload
          retention-days: 30